# Base 설정. 환경별 application-{dev,prod}.yaml이 host/port 등을 덮어쓴다.
spring:
  application:
    name: api-gateway

  # R-50: SC Gateway RequestRateLimiter용 Redis (Reactive). Phase 5에서는
  # K8s Service DNS (예: redis-master.platform)로 override함. dev/local은 6379.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # K8s 단계에서 ConfigMap/Secret 의 REDIS_PASSWORD ENV 가 주입됨. Spring Boot 의
      # relaxed binding 은 SPRING_DATA_REDIS_PASSWORD ENV 만 자동 매핑하므로
      # `${REDIS_PASSWORD}` 명시적 placeholder 가 필요. 다른 5 service 의 application.yaml
      # 패턴과 일치 (auth-service / user-service / product-service / order-service /
      # inventory-service 모두 `password: ${REDIS_PASSWORD:...}` 명시).
      # 누락 시 Lettuce 가 AUTH 안 보냄 → Redis (--requirepass 설정 시) NOAUTH HELLO 거부.
      password: ${REDIS_PASSWORD:}

  # Q1 (c) 혼합 패턴 — Spring Cloud Gateway routes 신규 추가.
  # BFF (REST controllers) 가 처리하는 경로: /api/v1/{orders,products,inventories}/**, /api/v1/auth/**
  # SC Gateway routes 가 처리하는 경로 (reverse proxy):
  #   - /api/v1/users/** → user-service (BFF 없이 직접 패스스루)
  #   - /admin/v1/orders/** → order-service (admin endpoint, JWT 보호 영역과 별도)
  cloud:
    gateway:
      server:
        webflux:
          # R-50 (평가 기본 (2)-5): Token Bucket Rate Limit.
          # default-filters 로 SC Gateway routes 전부에 적용함. BFF 경로(WebFlux controller가
          # 처리하는 /api/v1/auth /products /orders /inventory) 는 SC Gateway 거치지
          # 않으므로 별도 보호 필요 — 발표 단계 한정 SC Gateway routes 만 cover, BFF 경로는
          # Resilience4j RateLimiter 또는 후속 WebFilter 로 보강 예정.
          #
          # replenishRate: 초당 추가되는 토큰 수 (정상 throughput).
          # burstCapacity: 버킷 최대 토큰 수 (순간 burst 허용 한계).
          # 예) replenishRate=1, burstCapacity=10 → 평균 60 req/min + 순간 10 req burst 허용.
          default-filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
          routes:
            - id: user-service-route
              uri: ${ROUTE_USER_SERVICE_URI:http://localhost:8004}
              predicates:
                - Path=/api/v1/users/**
            - id: order-admin-route
              uri: ${ROUTE_ORDER_SERVICE_URI:http://localhost:8002}
              predicates:
                - Path=/admin/v1/orders/**
              # admin endpoint는 사용자 트래픽이 아니므로 별도 더 빡빡한 제한 부여.
              # default-filters 의 RequestRateLimiter 도 동시 적용되어 합집합으로 작동함.
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 1
                    redis-rate-limiter.burstCapacity: 3
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"

# gRPC clients (BFF용). K8s에서는 Service DNS로 override.
grpc:
  client:
    product-service:
      address: ${GRPC_PRODUCT_SERVICE_ADDR:static://localhost:9001}
      negotiation-type: plaintext
    order-service:
      address: ${GRPC_ORDER_SERVICE_ADDR:static://localhost:9002}
      negotiation-type: plaintext
    inventory-service:
      address: ${GRPC_INVENTORY_SERVICE_ADDR:static://localhost:9003}
      negotiation-type: plaintext
    auth-service:
      address: ${GRPC_AUTH_SERVICE_ADDR:static://localhost:9005}
      negotiation-type: plaintext

server:
  port: ${SERVER_PORT:8100}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info, prometheus
      path-mapping:
        health: healthz
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    groups-order: DESC
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# R-41 (평가 기본 (2)-3, (2)-4): Resilience4j Circuit Breaker — 백엔드 장애 격리.
# 동작 원리: sliding window에서 실패율이 threshold 초과 시 OPEN 상태로 전환됨.
# OPEN 상태에서는 호출 즉시 거부되어 fallback path가 실행됨 (장애 전파 차단).
# wait-duration 경과 후 HALF_OPEN — 일부 호출만 시험 통과 → 성공 시 CLOSED 복귀.
#
# 본 PR 적용 범위: inventory-service (Response Aggregate 데모용). product/order/auth 는
# 동일 패턴으로 후속 적용 가능. 발표 시 inventory 다운 시키고 fetchAll() 빈 리스트로
# 부분 응답 반환되는 것 시연.
resilience4j:
  circuitbreaker:
    instances:
      inventory-service:
        failure-rate-threshold: 50              # 50% 이상 실패 시 OPEN
        slow-call-rate-threshold: 50            # 50% 이상 slow call 시도 OPEN
        slow-call-duration-threshold: 2s        # 2초 초과 = slow
        minimum-number-of-calls: 5              # 평가 최소 호출 수 (warmup)
        sliding-window-size: 10                 # 최근 10건 평가
        wait-duration-in-open-state: 30s        # OPEN 후 30초 뒤 HALF_OPEN 진입
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true         # Actuator /healthz에 상태 노출
